<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background Gradient: Avocado Green to Darker Green -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5E9619" />
      <stop offset="100%" stop-color="#3F6212" />
    </linearGradient>
    <!-- Leaf Gradient: Vibrant Lime to Forest Green -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A3E635" />
      <stop offset="100%" stop-color="#4D7C0F" />
    </linearGradient>
    <!-- Bowl Gradient: Smooth White to Light Gray -->
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    <!-- Sparkle/AI Gradient: Tangerine Orange to Deep Orange -->
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="32" height="32" rx="8" fill="url(#bgGrad)" />

  <!-- Steam / AI Sparkle trails -->
  <!-- Sparkle 1 (Large AI Sparkle, top right) -->
  <path d="M 23 5 C 23 6.66 24.34 8 26 8 C 24.34 8 23 9.34 23 11 C 23 9.34 21.66 8 20 8 C 21.66 8 23 6.66 23 5 Z" fill="url(#sparkleGrad)" />
  
  <!-- Sparkle 2 (Small Sparkle, top left) -->
  <path d="M 8 9 C 8 10 9 11 10 11 C 9 11 8 12 8 13 C 8 12 7 11 6 11 C 7 11 8 10 8 9 Z" fill="#FDE047" opacity="0.9" />

  <!-- Sprouting Leaf (represents healthy ingredients / fresh recipes) -->
  <path d="M 14 15 C 10 11 11 6 15 5 C 17 8 17 12 14 15 Z" fill="url(#leafGrad)" />
  <path d="M 14.5 10 C 13.5 8.5 12.5 7.5 12 7" stroke="#ECFCCB" stroke-width="0.75" stroke-linecap="round" opacity="0.6" />

  <!-- Cooking Bowl (representing recipes / food) -->
  <!-- Main Bowl Body -->
  <path d="M 7 16 C 7 22.5 11 25.5 16 25.5 C 21 25.5 25 22.5 25 16 Z" fill="url(#bowlGrad)" />
  <!-- Bowl Rim -->
  <rect x="5" y="14" width="22" height="2.5" rx="1.25" fill="#FFFFFF" />
  
  <!-- Subtle Bowl Accent Line (for depth) -->
  <path d="M 9 18 C 9 22 12 23.5 16 23.5 C 20 23.5 23 22 23 18" stroke="#CBD5E1" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.6" />
</svg>